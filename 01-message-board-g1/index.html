<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/js.svg" />
    <title>Message Board</title>
    <meta name="description" content="A simple message board application." />
  </head>
  <body>
    <h1>Message board</h1>
    <form id="form">
      <input required type="text" name="subject" placeholder="Subject" />
      <input required name="body" placeholder="Write your message here..." />
      <button>Send message</button>
    </form>
    <ul id="list"></ul>
    <div id="summary"></div>
    <script type="module" src="/src/index.ts"></script>
    <link rel="stylesheet" href="/src/index.css" />
  </body>
</html>
