<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/js.svg" />
    <title>Vite Starter</title>
    <meta
      name="description"
      content="A basic starter template for building apps with Vite."
    />
  </head>
  <body>
    <form id="form">
      <input
        type="text"
        required
        placeholder="Your next task"
        autofocus
        minlength="5"
        name="todo"
      />
      <button type="submit">Submit</button>
    </form>
    <ul id="list"></ul>

    <script type="module" src="/src/index.ts"></script>
    <link rel="stylesheet" href="/src/index.css" />
  </body>
</html>
